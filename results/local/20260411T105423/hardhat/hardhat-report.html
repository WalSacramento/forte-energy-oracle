reateAuction(\n    METER_ID, ENERGY_AMOUNT, START_PRICE, MIN_PRICE, DURATION\n);\nawait tx1.wait();\nconst auctionId = 1n;\nconst auction = await energyAuction.getAuction(auctionId);\nconst requestId = auction.oracleRequestId;\nexpect(auction.status).to.equal(0); // Active\n// Step 2: Oracles respond with sufficient reading\nconst sig1 = await signResponse(oracle1, requestId, ENERGY_AMOUNT);\nawait oracleAggregator.connect(oracle1).submitResponse(requestId, ENERGY_AMOUNT, sig1);\nconst sig2 = await signResponse(oracle2, requestId, ENERGY_AMOUNT);\nawait oracleAggregator.connect(oracle2).submitResponse(requestId, ENERGY_AMOUNT, sig2);\n// Verify oracle completed\nconst request = await oracleAggregator.getRequest(requestId);\nexpect(request.status).to.equal(2); // COMPLETED\n// Step 3: Advance time so price has decayed\nawait time.increase(1800n); // 30 min — price at midpoint\nconst currentPrice = await energyAuction.getCurrentPrice(auctionId);\nexpect(currentPrice).to.be.lt(START_PRICE);\nexpect(currentPrice).to.be.gte(MIN_PRICE);\n// Step 4: Buyer places bid — overpay slightly so price decay doesn&#x27;t cause revert\nconst overpay = currentPrice * ENERGY_AMOUNT * 2n; // 2x is plenty\nconst sellerBalanceBefore = await ethers.provider.getBalance(seller.address);\nawait energyAuction.connect(buyer).placeBid(auctionId, { value: overpay });\nconst auctionAfterBid = await energyAuction.getAuction(auctionId);\nexpect(auctionAfterBid.status).to.equal(1); // PendingValidation\nexpect(auctionAfterBid.winner).to.equal(buyer.address);\nconst actualTotalCost = auctionAfterBid.finalPrice * ENERGY_AMOUNT;\n// Step 5: Anyone finalizes (oracle already completed)\nawait energyAuction.finalizeAuction(auctionId);\nconst auctionFinal = await energyAuction.getAuction(auctionId);\nexpect(auctionFinal.status).to.equal(2); // Finalized\nconst sellerBalanceAfter = await ethers.provider.getBalance(seller.address);\nexpect(sellerBalanceAfter - sellerBalanceBefore).to.equal(actualTotalCost);& 7ef-47c3-abc4-7c94f1524767&quot;,&quot;parentUUID&quot;:&quot;19f62d81-0b52-498c-8d9e-5e452880d80e&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;Seller can cancel before any bid&quot;,&quot;fullTitle&quot;:&quot;AuctionFlow Integration Seller can cancel before any bid&quot;,&quot;timedOut&quot;:false,&quot;duration&quot;:52,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;medium&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;const { energyAuction, seller } = await deployAll();\nawait energyAuction.connect(seller).createAuction(\n    METER_ID, ENERGY_AMOUNT, START_PRICE, MIN_PRICE, DURATION\n);\nawait energyAuction.connect(seller).cancelAuction(1n);\nconst auction = await energyAuction.getAuction(1n);\nexpect(auction.status).to.equal(3); // Cancelled&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;8c713bf0-3341-4b7a-88a1-141db9e82712&quot;,&quot;parentUUID&quot;:&quot;19f62d81-0b52-498c-8d9e-5e452880d80e&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false}],&quot;suites&quot;:[],&quot;passes&quot;:[&quot;69f03b02-d7b2-4a3c-bfd0-3f6251bea883&quot;,&quot;8a4db8db-97ef-47c3-abc4-7c94f1524767&quot;,&quot;8c713bf0-3341-4b7a-88a1-141db9e82712&quot;],&quot;failures&quot;:[],&quot;pending&quot;:[],&quot;skipped&quot;:[],&quot;duration&quot;:683,&quot;root&quot;:false,&quot;rootEmpty&quot;:false,&quot;_timeout&quot;:40000},{&quot;uuid&quot;:&quot;b8b9f5c8-2385-410d-ad0f-29cb7852b625&quot;,&quot;title&quot;:&quot;Integration: Full Trading Flow&quot;,&quot;fullFile&quot;:&quot;/home/waldsson/workspace/energy-oracle-network/test/integration/FullFlow.test.js&quot;,&quot;file&quot;:&quot;/test/integration/FullFlow.test.js&quot;,&quot;beforeHooks&quot;:[],&quot;afterHooks&quot;:[],&quot;tests&quot;:[{&quot;title&quot;:&quot;Should complete full trading flow with oracle validation&quot;,&quot;fullTitle&quot;:&quot;Integration: Full Trading Flow Should complete full trading flow with oracle validation&quot;,&quot;timedOut&quot;:false,&quot;duration&quot;:81,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;slow&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;const { \n    oracleAggregator, \n    gridValidator, \n    energyTrading, \n    oracle1, \n    oracle2, \n    oracle3, \n    seller, \n    buyer \n} = await loadFixture(deployAllContractsFixture);\nconsole.log(\&quot;\\n=== Full Trading Flow Test ===\\n\&quot;);\n// Step 1: Seller creates an offer\nconsole.log(\&quot;Step 1: Creating energy offer...\&quot;);\nconst meterId = \&quot;METER001\&quot;;\nconst amount = 1000; // Wh\nconst pricePerWh = 100; // wei per Wh\nconst totalPrice = BigInt(amount) * BigInt(pricePerWh);\nconst createTx = await energyTrading.connect(seller).createOffer(\n    meterId,\n    amount,\n    pricePerWh,\n    3600 // 1 hour duration\n);\nawait createTx.wait();\nconst offer = await energyTrading.getOffer(1);\nexpect(offer.id).to.equal(1);\nexpect(offer.seller).to.equal(seller.address);\nconsole.log(`   Offer created: ID=${offer.id}, Amount=${amount}Wh, Price=${pricePerWh}wei/Wh`);\n// Step 2: Oracles respond to validation request\nconsole.log(\&quot;\\nStep 2: Oracles submitting responses...\&quot;);\nconst requestId = offer.requestId;\nconst sig1 = await signResponse(oracle1, requestId, 5000);\nawait oracleAggregator.connect(oracle1).submitResponse(requestId, 5000, sig1);\nconsole.log(\&quot;   Oracle 1 submitted: 5000 Wh\&quot;);\nconst sig2 = await signResponse(oracle2, requestId, 5100);\nawait oracleAggregator.connect(oracle2).submitResponse(requestId, 5100, sig2);\nconsole.log(\&quot;   Oracle 2 submitted: 5100 Wh\&quot;);\nconst sig3 = await signResponse(oracle3, requestId, 5050);\nawait oracleAggregator.connect(oracle3).submitResponse(requestId, 5050, sig3);\nconsole.log(\&quot;   Oracle 3 submitted: 5050 Wh\&quot;);\n// Verify aggregation\nconst request = await oracleAggregator.getRequest(requestId);\nexpect(request.status).to.equal(2); // Completed\nconsole.log(`   Aggregated value: ${request.aggregatedValue} Wh`);\n// Step 3: Update offer with validated reading\nconsole.log(\&quot;\\nStep 3: Updating offer with validation...\&quot;);\nawait energyTrading.updateOfferValidation(1);\n\nconst validatedOffer = await energyTrading.getOffer(1);\nexpect(validatedOffer.validatedReading).to.equal(request.aggregatedValue);\nconsole.log(`   Offer validated with reading: ${validatedOffer.validatedReading} Wh`);\n// Step 4: Buyer accepts the offer\nconsole.log(\&quot;\\nStep 4: Buyer accepting offer...\&quot;);\nconst sellerBalanceBefore = await ethers.provider.getBalance(seller.address);\nconst acceptTx = await energyTrading.connect(buyer).acceptOffer(1, { value: totalPrice });\nconst receipt = await acceptTx.wait();\nconst sellerBalanceAfter = await ethers.provider.getBalance(seller.address);\nconst received = sellerBalanceAfter - sellerBalanceBefore;\nexpect(received).to.equal(totalPrice);\nconsole.log(`   Trade executed! Seller received: ${received} wei`);\n// Step 5: Verify final state\nconsole.log(\&quot;\\nStep 5: Verifying final state...\&quot;);\nconst finalOffer = await energyTrading.getOffer(1);\nexpect(finalOffer.status).to.equal(1); // Filled\nconsole.log(`   Offer status: FILLED`);\nconst trade = await energyTrading.getTrade(1);\nexpect(trade.buyer).to.equal(buyer.address);\nexpect(trade.amount).to.equal(amount);\nconsole.log(`   Trade ID: ${trade.id}, Buyer: ${trade.buyer.slice(0, 10)}...`);\nconsole.log(\&quot;\\n✅ Full trading flow completed successfully!\\n\&quot;);&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;5228db72-0240-4d90-a383-8bd2e3add785&quot;,&quot;parentUUID&quot;:&quot;b8b9f5c8-2385-410d-ad0f-29cb7852b625&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;Should reject trade with Byzantine oracle&quot;,&quot;fullTitle&quot;:&quot;Integration: Full Trading Flow Should reject trade with Byzantine oracle&quot;,&quot;timedOut&quot;:false,&quot;duration&quot;:21,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;const { \n    oracleAggregator, \n    energyTrading, \n    oracle1, \n    oracle2, \n    oracle3, \n    seller, \n    buyer \n} = await loadFixture(deployAllContractsFixture);\nconsole.log(\&quot;\\n=== Byzantine Oracle Trade Test ===\\n\&quot;);\n// Create offer\nawait energyTrading.connect(seller).createOffer(\&quot;METER001\&quot;, 1000, 100, 3600);\nconst offer = await energyTrading.getOffer(1);\n// Oracle 3 is malicious (10x value)\nconst sig1 = await signResponse(oracle1, offer.requestId, 5000);\nawait oracleAggregator.connect(oracle1).submitResponse(offer.requestId, 5000, sig1);\nconst sig2 = await signResponse(oracle2, offer.requestId, 5100);\nawait oracleAggregator.connect(oracle2).submitResponse(offer.requestId, 5100, sig2);\nconst sig3 = await signResponse(oracle3, offer.requestId, 50000); // Malicious\nawait oracleAggregator.connect(oracle3).submitResponse(offer.requestId, 50000, sig3);\n// Check outlier was detected\nconst oracleInfo = await oracleAggregator.getOracleInfo(oracle3.address);\nexpect(oracleInfo.reputation).to.be.lt(70n); // Penalized from 70\n// Check aggregation excluded outlier\nconst request = await oracleAggregator.getRequest(offer.requestId);\nexpect(request.aggregatedValue).to.equal(5050); // Average of honest values only\nconsole.log(\&quot;✅ Byzantine oracle detected, trade proceeds with honest values\\n\&quot;);&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;4a3f1506-69fe-4979-8db6-d100f5ab797b&quot;,&quot;parentUUID&quot;:&quot;b8b9f5c8-2385-410d-ad0f-29cb7852b625&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;Should handle multiple concurrent offers&quot;,&quot;fullTitle&quot;:&quot;Integration: Full Trading Flow Should handle multiple concurrent offers&quot;,&quot;timedOu e,&quot;skipped&quot;:false}],&quot;suites&quot;:[],&quot;passes&quot;:[&quot;5228db72-0240-4d90-a383-8bd2e3add785&quot;,&quot;4a3f1506-69fe-4979-8db6-d100f5ab797b&quot;,&quot;15694454-eb2e-47b5-8edf-4008950a3073&quot;],&quot;failures&quot;:[],&quot;pending&quot;:[],&quot;skipped&quot;:[],&quot;duration&quot;:161,&quot;root&quot;:false,&quot;rootEmpty&quot;:false,&quot;_timeout&quot;:40000},{&quot;uuid&quot;:&quot;b3fefffe-51d9-4cef-86ab-5c34f5865ce6&quot;,&quot;title&quot;:&quot;Scenario S1: Normal Operation&quot;,&quot;fullFile&quot;:&quot;/home/waldsson/workspace/energy-oracle-network/test/scenarios/S1_Normal.test.js&quot;,&quot;file&quot;:&quot;/test/scenarios/S1_Normal.test.js&quot;,&quot;beforeHooks&quot;:[],&quot;afterHooks&quot;:[],&quot;tests&quot;:[{&quot;title&quot;:&quot;Should complete multiple requests with 3 oracles responding&quot;,&quot;fullTitle&quot;:&quot;Scenario S1: Normal Operation Should complete multiple requests with 3 oracles responding&quot;,&quot;timedOut&quot;:false,&quot;duration&quot;:211,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;slow&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;const { oracleAggregator, oracle1, oracle2, oracle3 } = await loadFixture(deployFixture);\nconst metrics = new MetricsCollector();\nfor (let i = 0; i &lt; NUM_REQUESTS; i++) {\n    const startTime = Date.now();\n    // Create request\n    const tx = await oracleAggregator.requestData(`METER00${i % 3 + 1}`);\n    await tx.wait();\n    const requestId = i + 1;\n    // Generate readings with realistic variation\n    const value1 = generateReading(BASE_READING);\n    const value2 = generateReading(BASE_READING);\n    const value3 = generateReading(BASE_READING);\n    // Submit responses\n    const sig1 = await signResponse(oracle1, requestId, value1);\n    const tx1 = await oracleAggregator.connect(oracle1).submitResponse(requestId, value1, sig1);\n    const receipt1 = await tx1.wait();\n est.js&quot;,&quot;beforeHooks&quot;:[],&quot;afterHooks&quot;:[],&quot;tests&quot;:[{&quot;title&quot;:&quot;Should detect 10x outlier and exclude from aggregation&quot;,&quot;fullTitle&quot;:&quot;Scenario S3: Byzantine Fault (Malicious 10x) Should detect 10x outlier and exclude from aggregation&quot;,&quot;timedOut&quot;:false,&quot;duration&quot;:41,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;medium&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;const { oracleAggregator, oracle1, oracle2, oracle3 } = await loadFixture(deployFixture);\nawait oracleAggregator.requestData(\&quot;METER001\&quot;);\n// Oracle 1 and 2 respond honestly\nconst sig1 = await signResponse(oracle1, 1, 5000);\nawait oracleAggregator.connect(oracle1).submitResponse(1, 5000, sig1);\nconst sig2 = await signResponse(oracle2, 1, 5100);\nawait oracleAggregator.connect(oracle2).submitResponse(1, 5100, sig2);\n// Oracle 3 responds with malicious 10x value\nconst maliciousValue = BASE_READING * MALICIOUS_MULTIPLIER; // 50000\nconst sig3 = await signResponse(oracle3, 1, maliciousValue);\nawait expect(\n    oracleAggregator.connect(oracle3).submitResponse(1, maliciousValue, sig3)\n).to.emit(oracleAggregator, \&quot;OutlierDetected\&quot;)\n    .withArgs(1, oracle3.address, maliciousValue);\n// Check aggregated value excludes outlier\nconst request = await oracleAggregator.getRequest(1);\nexpect(request.aggregatedValue).to.equal(5050); // (5000 + 5100) / 2\n// NOT the average with outlier: (5000 + 5100 + 50000) / 3 = 20033\nconsole.log(\&quot;\\n✅ 10x outlier detected and excluded\&quot;);\nconsole.log(`   - Honest values: [5000, 5100]`);\nconsole.log(`   - Malicious value: ${maliciousValue}`);\nconsole.log(`   - Aggregated result: ${request.aggregatedValue}`);&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;8eac8a2a-f89f-4726-8a48-0b9d057dc6a1&quot;,&quot;parentUUID&quot;:&quot;ae629b6c-2d0e-4957-8873-f00c097710e1&quot;,&quot;isHook& onse(oracle1, 1, 5000);\nawait oracleAggregator.connect(oracle1).submitResponse(1, 5000, sig1);\nconst sig2 = await signResponse(oracle2, 1, 5050);\nawait oracleAggregator.connect(oracle2).submitResponse(1, 5050, sig2);\n// +12% should trigger outlier (above 10% threshold)\n// Median after aggregation will be 5050, +12% = 5656\n// Note: Using 12% instead of 11% to avoid integer truncation issues\n// (11% can truncate to exactly 10% with integer division)\nconst borderlineOutlier = Math.round(5050 * 1.12); // 5656\nconst sig3 = await signResponse(oracle3, 1, borderlineOutlier);\nawait expect(\n    oracleAggregator.connect(oracle3).submitResponse(1, borderlineOutlier, sig3)\n).to.emit(oracleAggregator, \&quot;OutlierDetected\&quot;);\nconsole.log(\&quot;\\n✅ +12% detected as outlier (above 10% threshold)\&quot;);\nconsole.log(`   - Borderline value: ${borderlineOutlier}`);&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;131d1c0f-c9cb-4238-95ad-096bf445998a&quot;,&quot;parentUUID&quot;:&quot;42081cb3-0d65-4794-a610-2aab08f8263f&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;Should test threshold sensitivity with different percentages&quot;,&quot;fullTitle&quot;:&quot;Scenario S4: Subtle Manipulation (+15%) Should test threshold sensitivity with different percentages&quot;,&quot;timedOut&quot;:false,&quot;duration&quot;:112,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;slow&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;const { oracleAggregator, oracle1, oracle2, oracle3 } = await loadFixture(deployFixture);\nconst testCases = [\n    { percent: 5, shouldBeOutlier: false },\n    { percent: 8, shouldBeOutlier: false },\n    { percent: 10, shouldBeOutlier: false }, // Exactly at threshold - implementation dependent\n    { percent: 12, shouldBeOutlier: true },\n    { percent: 15, shouldBeOutlier: true },\n    { percent: 20, shouldBeOutlier: true },\n];\nconsole.log(\&quot 0);\n        const value2 = generateReading(5000);\n        const value3 = generateReading(5000);\n        // Submit responses\n        const sig1 = await signResponse(oracle1, requestId, value1);\n        const tx1 = await oracleAggregator.connect(oracle1).submitResponse(requestId, value1, sig1);\n        const receipt1 = await tx1.wait();\n        const sig2 = await signResponse(oracle2, requestId, value2);\n        const tx2 = await oracleAggregator.connect(oracle2).submitResponse(requestId, value2, sig2);\n        const receipt2 = await tx2.wait();\n        const sig3 = await signResponse(oracle3, requestId, value3);\n        const tx3 = await oracleAggregator.connect(oracle3).submitResponse(requestId, value3, sig3);\n        const receipt3 = await tx3.wait();\n        const latency = Date.now() - startTime;\n        const totalGas = receipt1.gasUsed + receipt2.gasUsed + receipt3.gasUsed;\n        // Verify completion\n        const request = await oracleAggregator.getRequest(requestId);\n        if (request.status === 2n) {\n            successCount++;\n            metrics.recordSuccess();\n        } else {\n            failCount++;\n            metrics.recordFailure();\n        }\n        metrics.recordLatency(latency);\n        metrics.recordGas(totalGas);\n        // Progress indicator every 10 requests\n        if ((i + 1) % 10 === 0) {\n            console.log(`   Processed ${i + 1}/${NUM_REQUESTS} requests...`);\n        }\n    } catch (error) {\n        failCount++;\n        metrics.recordFailure();\n        console.error(`   Request ${i + 1} failed: ${error.message}`);\n    }\n}\nconst totalDuration = Date.now() - testStartTime;\nconst throughput = (successCount / totalDuration) * 60000; // requests per minute\n// Print metrics\nmetrics.printReport();\nconst stats = metrics.getStats();\nconsole.log(\&quot;\\n═══════════════════════════════════════════\&quot;);\nconsole.log(\&quot;           STRESS TEST SUMMARY             \&quot;);\nconsole.log(\&quot;═══════════════════════════════════════════\&quot;);\nconsole.log(`Total requests:     ${NUM_REQUESTS}`);\nconsole.log(`Successful:         ${successCount}`);\nconsole.log(`Failed:             ${failCount}`);\nconsole.log(`Success rate:       ${(stats.requests.successRate * 100).toFixed(2)}%`);\nconsole.log(`Total duration:     ${totalDuration}ms`);\nconsole.log(`Throughput:         ${throughput.toFixed(2)} req/min`);\nconsole.log(`Avg latency:        ${stats.latency.avg}ms`);\nconsole.log(`P95 latency:        ${stats.latency.p95}ms`);\nconsole.log(`P99 latency:        ${stats.latency.p99}ms`);\nconsole.log(`Avg gas/cycle:      ${stats.gas.avg}`);\nconsole.log(`Total gas:          ${stats.gas.total}`);\nconsole.log(\&quot;═══════════════════════════════════════════\\n\&quot;);\n// Assertions\nexpect(stats.requests.successRate).to.be.gte(0.99, \&quot;Success rate should be &gt;= 99%\&quot;);\nexpect(throughput).to.be.gte(10, \&quot;Throughput should be &gt;= 10 req/min\&quot;);\nconsole.log(\&quot;✅ S6 Stress Test: PASSED\&quot;);&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;21a69d67-164e-41c9-80d7-15d32c3f1927&quot;,&quot;parentUUID&quot;:&quot;b0ed8a3c-4837-4892-a9ab-79b7322b7488&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;Should maintain consistent gas usage under load&quot;,&quot;fullTitle&quot;:&quot;Scenario S6: Stress Test (100 requests) Should maintain consistent gas usage under load&quot;,&quot;timedOut&quot;:false,&quot;duration&quot;:397,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;slow&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;const { oracleAggregator, oracle1, oracle2, oracle3 } = await loadFixture(deployFixture);\nconst gasUsages = [];\n// Run 20 requests and measure gas\nfor (let i = 0; i &lt; 20; i++) {\n    await oracleAggregator.requestData(`METER${i + 1}`);\n    const requestId = i + 1;\n    const sig1 = await signResponse(oracle1, requestId, 5000);\n    const tx1 = await oracleAggregator.connect(oracle1).submitResponse(requestId, 5000, sig1);\n    const receipt1 = await tx1.wait();\n    const sig2 = await signResponse(oracle2, requestId, 5050);\n    const tx2 = await oracleAggregator.connect(oracle2).submitResponse(requestId, 5050, sig2);\n    const receipt2 = await tx2.wait();\n    const sig3 = await signResponse(oracle3, requestId, 5025);\n    const tx3 = await oracleAggregator.connect(oracle3).submitResponse(requestId, 5025, sig3);\n    const receipt3 = await tx3.wait();\n    const totalGas = Number(receipt1.gasUsed + receipt2.gasUsed + receipt3.gasUsed);\n    gasUsages.push(totalGas);\n}\n// Calculate variance\nconst avg = gasUsages.reduce((a, b) =&gt; a + b, 0) / gasUsages.length;\nconst variance = gasUsages.reduce((sum, val) =&gt; sum + Math.pow(val - avg, 2), 0) / gasUsages.length;\nconst stdDev = Math.sqrt(variance);\nconst coefficientOfVariation = (stdDev / avg) * 100;\nconsole.log(`\\n--- Gas Usage Consistency ---`);\nconsole.log(`Average gas:        ${avg.toFixed(0)}`);\nconsole.log(`Std deviation:      ${stdDev.toFixed(0)}`);\nconsole.log(`Coefficient of var: ${coefficientOfVariation.toFixed(2)}%`);\n// Gas usage should be relatively consistent (&lt; 10% variation)\n// Note: Gas includes 3 submitResponse transactions + aggregation\n// Typical range: 600k-800k gas per complete cycle\nexpect(coefficientOfVariation).to.be.lt(10, \&quot;Gas usage variance should be &lt; 10%\&quot;);\nexpect(avg).to.be.lt(1000000, \&quot;Average gas should be &lt; 1,000,000 for 3 responses + aggregation\&quot;);\nconsole.log(\&quot;✅ Gas usage consistent under load\&quot;);&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;627a4e11-60d1-4fd0-a050-d840efdb5101&quot;,&quot;parentUUID&quot;:&quot;b0ed8a3c-4837-4892-a9ab-79b7322b7488&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false}],&quot;suites&quot;:[],&quot;passes&quot;:[&quot;21a69d67-164e-41c9-80d7-15d32c3f1927&quot;,&quot;627a4e11-60d1-4fd0-a050- ;\ninfo = await oracleAggregator.getOracleInfo(oracle3.address);\nconst repAfterPenalty = Number(info.reputation);\nreputationHistory.push({ request: requestId, reputation: repAfterPenalty, action: \&quot;malicious\&quot; });\nconsole.log(`After malicious response: ${repAfterPenalty} (-${PENALTY_AMOUNT})`);\nexpect(repAfterPenalty).to.equal(INITIAL_REPUTATION - PENALTY_AMOUNT);\n// Step 2: Oracle 3 submits honest responses to recover\nconst honestRequestsNeeded = PENALTY_AMOUNT; // Need 5 honest responses to recover\nconsole.log(`\\nRecovering through ${honestRequestsNeeded} honest responses...`);\nfor (let i = 0; i &lt; honestRequestsNeeded; i++) {\n    requestId++;\n    await oracleAggregator.requestData(`METER_RECOVERY_${i}`);\n    sig1 = await signResponse(oracle1, requestId, 5000);\n    await oracleAggregator.connect(oracle1).submitResponse(requestId, 5000, sig1);\n    sig2 = await signResponse(oracle2, requestId, 5050);\n    await oracleAggregator.connect(oracle2).submitResponse(requestId, 5050, sig2);\n    sig3 = await signResponse(oracle3, requestId, 5025); // Honest\n    await oracleAggregator.connect(oracle3).submitResponse(requestId, 5025, sig3);\n    info = await oracleAggregator.getOracleInfo(oracle3.address);\n    reputationHistory.push({ \n        request: requestId, \n        reputation: Number(info.reputation), \n        action: \&quot;honest\&quot; \n    });\n}\nconst repAfterRecovery = Number(info.reputation);\nconsole.log(`After ${honestRequestsNeeded} honest responses: ${repAfterRecovery}`);\nexpect(repAfterRecovery).to.equal(INITIAL_REPUTATION);\n// Step 3: Continue with more honest responses to exceed initial\nconst additionalRequests = 5;\nfor (let i = 0; i &lt; additionalRequests; i++) {\n    requestId++;\n    await oracleAggregator.requestData(`METER_EXTRA_${i}`);\n    sig1 = await signResponse(oracle1, requestId, 5000);\n    await oracleAggregator.connect(oracle1).submitResponse(requestId, 5000, sig1);\n    sig2 = await signResponse(oracle2, requestId, 5050);\n    await oracleAggregator.connect(oracle2).submitResponse(requestId, 5050, sig2);\n    sig3 = await signResponse(oracle3, requestId, 5025);\n    await oracleAggregator.connect(oracle3).submitResponse(requestId, 5025, sig3);\n    info = await oracleAggregator.getOracleInfo(oracle3.address);\n    reputationHistory.push({ \n        request: requestId, \n        reputation: Number(info.reputation), \n        action: \&quot;honest\&quot; \n    });\n}\nconst finalRep = Number(info.reputation);\nconsole.log(`After ${additionalRequests} more honest responses: ${finalRep}`);\nexpect(finalRep).to.equal(INITIAL_REPUTATION + additionalRequests);\n// Print reputation evolution\nconsole.log(\&quot;\\n═══════════════════════════════════════════\&quot;);\nconsole.log(\&quot;        REPUTATION EVOLUTION               \&quot;);\nconsole.log(\&quot;═══════════════════════════════════════════\&quot;);\nconsole.log(\&quot;Request | Reputation | Action\&quot;);\nconsole.log(\&quot;--------|------------|--------\&quot;);\nreputationHistory.forEach(h =&gt; {\n    console.log(`   ${h.request.toString().padStart(2)}   |     ${h.reputation.toString().padStart(2)}     | ${h.action}`);\n});\nconsole.log(\&quot;═══════════════════════════════════════════\\n\&quot;);\nconsole.log(\&quot;✅ S7 Reputation Recovery: PASSED\&quot;);&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;1223d5d3-e97d-4adb-91bf-f49150f301b9&quot;,&quot;parentUUID&quot;:&quot;605a65f7-cb9d-474d-8c6c-bd4dd1373830&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;Should track total and valid responses correctly&quot;,&quot;fullTitle&quot;:&quot;Scenario S7: Reputation Recovery Should track total and valid responses correctly&quot;,&quot;timedOut&quot;:false,&quot;duration&quot;:146,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;slow&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;const { oracleAggregator, ora
