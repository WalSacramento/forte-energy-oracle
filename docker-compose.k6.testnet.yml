services:
  # ========================================
  # Mock HEMS API (IoT Layer)
  # ========================================
  hems-api:
    build:
      context: ./mock-hems
      dockerfile: Dockerfile
    container_name: eaon-k6-hems
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      BASE_READING: 5000
      VARIANCE_PERCENT: 2
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - eaon-k6

  # ========================================
  # Oracle Node 1 (Prosumer) - Sepolia Testnet
  # ========================================
  oracle-1:
    build:
      context: ./oracle-nodes
      dockerfile: Dockerfile
    container_name: eaon-k6-oracle-1
    depends_on:
      hems-api:
        condition: service_healthy
    environment:
      NODE_ID: oracle-1
      NODE_TYPE: prosumer
      # Sepolia Oracle 1 Private Key (from .env.testnet)
      PRIVATE_KEY: ${ORACLE_1_PRIVATE_KEY}
      RPC_URL: ${SEPOLIA_RPC}
      HEMS_API_URL: http://hems-api:3000
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
      PORT: 4001
      LOG_LEVEL: info
    volumes:
      - ./deployments:/app/deployments:ro
    ports:
      - "4001:4001"
    networks:
      - eaon-k6
    restart: unless-stopped

  # ========================================
  # Oracle Node 2 (Consumer) - Sepolia Testnet
  # ========================================
  oracle-2:
    build:
      context: ./oracle-nodes
      dockerfile: Dockerfile
    container_name: eaon-k6-oracle-2
    depends_on:
      hems-api:
        condition: service_healthy
    environment:
      NODE_ID: oracle-2
      NODE_TYPE: consumer
      # Sepolia Oracle 2 Private Key (from .env.testnet)
      PRIVATE_KEY: ${ORACLE_2_PRIVATE_KEY}
      RPC_URL: ${SEPOLIA_RPC}
      HEMS_API_URL: http://hems-api:3000
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
      PORT: 4002
      LOG_LEVEL: info
    volumes:
      - ./deployments:/app/deployments:ro
    ports:
      - "4002:4002"
    networks:
      - eaon-k6
    restart: unless-stopped

  # ========================================
  # Oracle Node 3 (DSO) - Sepolia Testnet
  # ========================================
  oracle-3:
    build:
      context: ./oracle-nodes
      dockerfile: Dockerfile
    container_name: eaon-k6-oracle-3
    depends_on:
      hems-api:
        condition: service_healthy
    environment:
      NODE_ID: oracle-3
      NODE_TYPE: dso
      # Sepolia Oracle 3 Private Key (from .env.testnet)
      PRIVATE_KEY: ${ORACLE_3_PRIVATE_KEY}
      RPC_URL: ${SEPOLIA_RPC}
      HEMS_API_URL: http://hems-api:3000
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
      PORT: 4003
      LOG_LEVEL: info
    volumes:
      - ./deployments:/app/deployments:ro
    ports:
      - "4003:4003"
    networks:
      - eaon-k6
    restart: unless-stopped

  # ========================================
  # Test Orchestrator API (k6 Target) - Sepolia Testnet
  # ========================================
  test-orchestrator:
    build:
      context: ./test-orchestrator
      dockerfile: Dockerfile
    container_name: eaon-k6-orchestrator
    depends_on:
      hems-api:
        condition: service_healthy
      oracle-1:
        condition: service_started
      oracle-2:
        condition: service_started
      oracle-3:
        condition: service_started
    environment:
      PORT: 4000
      # Sepolia Deployer Private Key (from .env.testnet)
      DEPLOYER_PRIVATE_KEY: ${DEPLOYER_PRIVATE_KEY}
      RPC_URL: ${SEPOLIA_RPC}
      HEMS_API_URL: http://hems-api:3000
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
      LOG_LEVEL: info
      # Increased timeouts for Sepolia testnet (slower than local)
      WAIT_FOR_AGGREGATION_TIMEOUT: 90000
      POLL_INTERVAL: 2000
    volumes:
      - ./deployments:/app/deployments:ro
      - ./artifacts:/app/artifacts:ro
    ports:
      - "4000:4000"
    networks:
      - eaon-k6
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  eaon-k6:
    driver: bridge
    name: eaon-k6-network

